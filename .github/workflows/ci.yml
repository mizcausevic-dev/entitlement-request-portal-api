name: CI

on:
  push:
    branches: ["main", "project/**"]
  pull_request:

jobs:
  test-and-proof:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python proof dependency
        run: python -m pip install pillow

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Run PHP smoke tests
        run: php tests/run_tests.php

      - name: Run API smoke check
        run: python scripts/smoke_check.py

      - name: Render screenshots
        run: python scripts/render_readme_assets.py
